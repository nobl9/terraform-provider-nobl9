# This GitHub action can publish assets for release when a release draft is published.
#
# This uses an action (hashicorp/ghaction-import-gpg) that assumes you set your
# private key in the `GPG_PRIVATE_KEY` secret and passphrase in the `PASSPHRASE`
# secret. If you would rather own your own GPG handling, please fork this action
# or use an alternative one for key handling.
#
# You will need to pass the `--batch` flag to `gpg` in your signing step
# in `goreleaser` to indicate this is being used in a non-interactive mode.
#
name: Release
on:
  release:
    types: [published]
jobs:
  validate_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.validate.outputs.should_release }}
      tag_name: ${{ steps.validate.outputs.tag_name }}
    steps:
      - id: validate
        name: Validate release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

          if [[ "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta))?$ ]]; then
            echo "should_release=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Skipping unsupported release tag: ${TAG_NAME}"
          echo "should_release=false" >> "${GITHUB_OUTPUT}"

  test:
    needs: validate_release
    if: needs.validate_release.outputs.should_release == 'true'
    uses: ./.github/workflows/acc-tests.yml
    with:
      clientId: "${{ vars.TERRAFORM_NOBL9_CLIENT_ID }}"
      project: "${{ vars.TERRAFORM_NOBL9_PROJECT }}"
      ref: "${{ needs.validate_release.outputs.tag_name }}"
    secrets:
      clientSecret: "${{ secrets.TERRAFORM_NOBL9_CLIENT_SECRET }}"
  qa-approval:
    needs: validate_release
    if: needs.validate_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: qa-approval
    steps:
      - name: No-op approval
        run: echo "This is a no-op step, QA needs to approve it and may perform testing beforehand"
  goreleaser:
    runs-on: ubuntu-latest
    needs: [validate_release, test, qa-approval]
    if: needs.validate_release.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate_release.outputs.tag_name }}
          fetch-depth: 0
      - name: Unshallow
        run: git fetch --prune --unshallow
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY_2024_03 }}
          passphrase: ${{ secrets.PASSPHRASE_2024_03 }}
      - name: setup github
        run: git config --global url."https://n9-machine-user:${{ secrets.GH_TOKEN }}@github.com".insteadOf "https://github.com"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.validate_release.outputs.tag_name }}
