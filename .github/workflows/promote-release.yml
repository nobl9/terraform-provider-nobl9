name: Promote Release Draft

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promote-release
  cancel-in-progress: false

jobs:
  promote_release_draft:
    permissions:
      # write permission is required to update the draft release and push the tag
      contents: write
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_LABELER_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.3
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_LABELER_TOKEN }}
      - id: drafter
        name: Resolve release draft version
        uses: release-drafter/release-drafter@v7.3.1
        with:
          commitish: main
          token: ${{ secrets.RELEASE_LABELER_TOKEN }}
      - name: Add release notes to the draft
        run: .github/scripts/release-notes.sh "${{ steps.drafter.outputs.tag_name }}"
      - name: Create release tag
        env:
          TAG_NAME: ${{ steps.drafter.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TAG_NAME}" ]]; then
            echo "Release Drafter did not return tag_name." >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/${TAG_NAME}" > /dev/null; then
            echo "Tag ${TAG_NAME} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" > /dev/null; then
            echo "Tag ${TAG_NAME} already exists on origin." >&2
            exit 1
          fi

          git tag "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"
